<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wonder Time Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Wonder Time Tracker</h1>
    </header>

    <section class="controls">
      <label>
        Work Mode:
        <select id="workMode">
          <option value="Office">Office</option>
          <option value="Home">Work From Home</option>
        </select>
      </label>
      <div class="buttons">
        <button class="timein" onclick="timeIn()">Time In</button>
        <button class="timeout" onclick="timeOut()">Time Out</button>
      </div>
    </section>

    <section class="logs">
      <h2>Logs</h2>
      <table id="logTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Mode</th>
            <th>Time In</th>
            <th>Time Out</th>
            <th>Total Hours</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="report">
      <h2>Monthly Report</h2>
      <p id="monthlyHours">Total Hours This Month: 0</p>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
